<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timer</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #08080f;
      --accent: #d4a853;
      --accent-light: #f0cc7a;
      --accent-dim: #b8923e;
      --accent-glow: rgba(212, 168, 83, 0.45);
      --urgent: #e06c4a;
      --urgent-glow: rgba(224, 108, 74, 0.45);
      --overtime: #e04a4a;
      --overtime-glow: rgba(224, 74, 74, 0.5);
      --text: #f2efe8;
      --text-muted: #8a857c;
      --surface: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.12);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Noise */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .app {
      position: relative;
      z-index: 2;
      width: 340px;
      text-align: center;
    }

    /* ── Selector View ── */
    .view { display: none; }
    .view.active { display: block; }

    .selector-view { animation: viewIn 0.5s ease; }
    .timer-view { animation: viewIn 0.4s ease; }

    @keyframes viewIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .heading {
      font-weight: 200;
      font-size: 0.72rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .presets {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 1.2rem;
    }

    .preset {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'Orbitron', monospace;
      font-weight: 500;
      font-size: 0.82rem;
      padding: 0.65rem 0;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .preset span {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: 0.55rem;
      letter-spacing: 0.05em;
      opacity: 0.5;
      margin-left: 2px;
    }

    .preset:hover {
      border-color: var(--accent-dim);
      color: var(--text);
      background: rgba(212, 168, 83, 0.06);
    }

    .preset:active {
      transform: scale(0.96);
    }

    .custom-row {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .custom-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Orbitron', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 0.65rem 0.8rem;
      border-radius: 8px;
      outline: none;
      text-align: center;
      transition: border-color 0.2s ease;
    }

    .custom-input::placeholder {
      color: var(--text-muted);
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: 0.72rem;
    }

    .custom-input:focus {
      border-color: var(--accent-dim);
    }

    .custom-go {
      background: var(--surface);
      border: 1px solid var(--accent-dim);
      color: var(--accent);
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .custom-go:hover {
      background: rgba(212, 168, 83, 0.1);
      color: var(--accent-light);
    }

    .clock-group {
      margin-bottom: 1.2rem;
    }

    .clock-row {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 0.4rem;
    }

    .clock-label {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent-dim);
    }

    .current-time {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: 2.1rem;
      color: var(--text);
      letter-spacing: 0.05em;
      text-shadow: 0 0 16px rgba(234, 230, 222, 0.2);
    }

    .target-row {
      margin-top: 0.15rem;
    }

    .target-time {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: 1.1rem;
      color: var(--accent-dim);
      letter-spacing: 0.05em;
    }

    /* ── Timer View ── */
    .ring-area {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 0 auto 1.8rem;
    }

    .ring-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-track {
      fill: none;
      stroke: rgba(255, 255, 255, 0.04);
      stroke-width: 3;
    }

    .ring-progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 3.5;
      stroke-linecap: round;
      filter: drop-shadow(0 0 8px var(--accent-glow));
      transition: stroke 0.6s ease, filter 0.6s ease;
    }

    .ring-progress.urgent {
      stroke: var(--urgent);
      filter: drop-shadow(0 0 10px var(--urgent-glow));
    }

    .ring-dot {
      fill: var(--accent);
      filter: drop-shadow(0 0 4px var(--accent-glow));
      transition: fill 0.6s ease, filter 0.6s ease;
    }

    .ring-dot.urgent {
      fill: var(--urgent);
      filter: drop-shadow(0 0 5px var(--urgent-glow));
    }

    .ring-progress.overtime {
      stroke: var(--overtime);
      filter: drop-shadow(0 0 14px var(--overtime-glow));
      animation: overtimePulse 1s ease-in-out infinite;
    }

    .ring-dot.overtime {
      fill: var(--overtime);
      filter: drop-shadow(0 0 5px var(--overtime-glow));
      animation: overtimePulse 1s ease-in-out infinite;
    }

    .time-display {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .time-text {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 2.34rem;
      color: var(--text);
      line-height: 1;
      text-shadow: 0 0 20px rgba(212, 168, 83, 0.12);
      letter-spacing: 0.03em;
      transition: color 0.6s ease, text-shadow 0.6s ease;
    }

    .time-text.urgent {
      color: var(--urgent);
      text-shadow: 0 0 24px var(--urgent-glow);
    }

    .time-text.overtime {
      color: var(--overtime);
      text-shadow: 0 0 24px var(--overtime-glow);
      animation: overtimeTextPulse 1s ease-in-out infinite;
    }

    @keyframes overtimePulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    @keyframes overtimeTextPulse {
      0%, 100% { opacity: 0.7; text-shadow: 0 0 16px var(--overtime-glow); }
      50% { opacity: 1; text-shadow: 0 0 30px var(--overtime-glow); }
    }

    .time-fraction {
      font-family: 'Orbitron', monospace;
      font-weight: 400;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .time-fraction.visible { opacity: 1; }

    .duration-label {
      font-weight: 300;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .btn {
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }

    .btn:active { transform: scale(0.95); }

    .btn-primary {
      background: rgba(212, 168, 83, 0.12);
      border: 1px solid var(--accent-dim);
      color: var(--accent);
      font-size: 0.72rem;
      padding: 0.7rem 2rem;
    }

    .btn-primary:hover {
      background: rgba(212, 168, 83, 0.18);
      color: var(--accent-light);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.66rem;
      padding: 0.7rem 1.2rem;
    }

    .btn-secondary:hover {
      border-color: rgba(255, 255, 255, 0.12);
      color: var(--text);
    }

    /* ── Done State ── */
    .done-overlay {
      display: none;
    }

    .done-overlay.active {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .done-ring .ring-progress {
      stroke: var(--accent);
      filter: drop-shadow(0 0 14px var(--accent-glow));
      animation: ringPulse 2s ease-in-out infinite;
    }

    @keyframes ringPulse {
      0%, 100% { opacity: 0.4; filter: drop-shadow(0 0 8px var(--accent-glow)); }
      50% { opacity: 1; filter: drop-shadow(0 0 18px var(--accent-glow)); }
    }

    .done-text {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-shadow: 0 0 30px var(--accent-glow);
    }

    /* Keyboard hint */
    .hint {
      margin-top: 2rem;
      font-weight: 300;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.12);
    }

    .hint kbd {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.55rem;
    }

    @media (max-width: 400px) {
      .app { width: 300px; }
      .ring-area { width: 190px; height: 190px; }
      .time-text { font-size: 2.2rem; }
      .presets { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Selector -->
    <div class="view selector-view active" id="selectorView">
      <div class="heading">Set Timer</div>
      <div class="presets" id="presets"></div>
      <div class="custom-row">
        <input type="number" class="custom-input" id="customInput" placeholder="Custom minutes" max="600" />
        <button class="custom-go" id="customGo">Go</button>
      </div>
      <div class="hint"><kbd>Enter</kbd> to start custom</div>
    </div>

    <!-- Timer -->
    <div class="view timer-view" id="timerView">
      <div class="clock-group">
        <div class="clock-row">
          <span class="clock-label">Now</span>
          <span class="current-time" id="currentTime"></span>
        </div>
        <div class="clock-row target-row">
          <span class="clock-label">Target</span>
          <span class="target-time" id="targetTime"></span>
        </div>
      </div>
      <div class="ring-area" id="ringArea">
        <svg class="ring-svg" viewBox="0 0 200 200">
          <circle class="ring-track" cx="100" cy="100" r="88" />
          <circle class="ring-progress" id="ringProgress" cx="100" cy="100" r="88"
            stroke-dasharray="553.0" stroke-dashoffset="0" />
          <circle class="ring-dot" id="ringDot" cx="100" cy="12" r="3.5" />
        </svg>
        <div class="time-display">
          <div class="time-text" id="timeText">00:00</div>
          <div class="time-fraction" id="timeFraction">.00</div>
        </div>
      </div>
      <div class="controls" id="controls">
        <button class="btn btn-secondary" id="btnReset">Reset</button>
        <button class="btn btn-primary" id="btnAction">Pause</button>
      </div>

      <!-- Done -->
      <div class="done-overlay" id="doneOverlay">
        <div class="ring-area done-ring">
          <svg class="ring-svg" viewBox="0 0 200 200">
            <circle class="ring-track" cx="100" cy="100" r="88" />
            <circle class="ring-progress" cx="100" cy="100" r="88"
              stroke-dasharray="553.0" stroke-dashoffset="0" />
          </svg>
          <div class="time-display">
            <div class="done-text">DONE</div>
          </div>
        </div>
        <button class="btn btn-secondary" id="btnBack" style="margin-top:1.2rem">New Timer</button>
      </div>
    </div>
  </div>

  <script>
    const R = 88;
    const C = 2 * Math.PI * R;
    const PRESETS = [1, 3, 5, 10, 15, 20, 25, 30, 45, 60, 90, 120];
    const URGENT_THRESHOLD = 10; // seconds

    // Elements
    const selectorView = document.getElementById('selectorView');
    const timerView = document.getElementById('timerView');
    const presetsEl = document.getElementById('presets');
    const customInput = document.getElementById('customInput');
    const customGo = document.getElementById('customGo');
    const ringProgress = document.getElementById('ringProgress');
    const ringDot = document.getElementById('ringDot');
    const timeText = document.getElementById('timeText');
    const timeFraction = document.getElementById('timeFraction');
    const controls = document.getElementById('controls');
    const btnAction = document.getElementById('btnAction');
    const btnReset = document.getElementById('btnReset');
    const doneOverlay = document.getElementById('doneOverlay');
    const ringArea = document.getElementById('ringArea');
    const btnBack = document.getElementById('btnBack');

    // State
    let totalMs = 0;
    let remainingMs = 0;
    let state = 'select'; // select | running | paused | done
    let endTime = 0;
    let rafId = null;
    let backupInterval = null;
    let overtimeStarted = false;

    // Build presets
    PRESETS.forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'preset';
      btn.innerHTML = m < 60 ? `${m}<span>m</span>` : `${m}<span>m</span>`;
      btn.addEventListener('click', () => startTimer(m));
      presetsEl.appendChild(btn);
    });

    customGo.addEventListener('click', startCustom);
    customInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') startCustom();
    });

    btnAction.addEventListener('click', togglePause);
    btnReset.addEventListener('click', resetTimer);
    btnBack.addEventListener('click', resetTimer);

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      if (state === 'select') return;
      if (e.code === 'Space') { e.preventDefault(); togglePause(); }
      if (e.code === 'Escape') resetTimer();
    });

    function startCustom() {
      const v = parseInt(customInput.value);
      if (v) startTimer(v);
    }

    function startTimer(minutes) {
      totalMs = minutes * 60 * 1000;
      remainingMs = totalMs;
      state = 'running';
      endTime = Date.now() + totalMs;

      showView('timer');
      doneOverlay.classList.remove('active');
      ringArea.style.display = '';
      controls.style.display = '';
      btnAction.textContent = 'Pause';

      // Reset urgency/overtime classes
      overtimeStarted = false;
      ringProgress.classList.remove('urgent', 'overtime');
      ringDot.classList.remove('urgent', 'overtime');
      timeText.classList.remove('urgent', 'overtime');

      // If starting negative, enter overtime visuals immediately (no sound)
      if (minutes < 0) {
        overtimeStarted = true;
        ringProgress.classList.add('overtime');
        ringDot.classList.add('overtime');
        timeText.classList.add('overtime');
      }

      // Set ring full
      ringProgress.setAttribute('stroke-dasharray', C);
      ringProgress.setAttribute('stroke-dashoffset', '0');

      cancelAnimationFrame(rafId);
      clearInterval(backupInterval);
      rafId = requestAnimationFrame(tick);
      backupInterval = setInterval(backgroundTick, 1000);
    }

    function togglePause() {
      if (state === 'done') return;
      if (state === 'running') {
        state = 'paused';
        btnAction.textContent = 'Resume';
        cancelAnimationFrame(rafId);
        clearInterval(backupInterval);
      } else if (state === 'paused') {
        state = 'running';
        btnAction.textContent = 'Pause';
        endTime = Date.now() + remainingMs;
        rafId = requestAnimationFrame(tick);
        backupInterval = setInterval(backgroundTick, 1000);
      }
    }

    function resetTimer() {
      state = 'select';
      overtimeStarted = false;
      cancelAnimationFrame(rafId);
      clearInterval(backupInterval);
      ringProgress.classList.remove('urgent', 'overtime');
      ringDot.classList.remove('urgent', 'overtime');
      timeText.classList.remove('urgent', 'overtime');
      showView('selector');
      customInput.value = '';
    }

    function showView(name) {
      selectorView.classList.toggle('active', name === 'selector');
      timerView.classList.toggle('active', name === 'timer');

      // Re-trigger animation
      const view = name === 'selector' ? selectorView : timerView;
      view.style.animation = 'none';
      view.offsetHeight;
      view.style.animation = '';
    }

    function tick() {
      remainingMs = endTime - Date.now();
      render();
      rafId = requestAnimationFrame(tick);
    }

    function backgroundTick() {
      if (state !== 'running') return;
      remainingMs = endTime - Date.now();
      render();
    }

    function render() {
      if (remainingMs > 0) {
        const progress = remainingMs / totalMs;
        const offset = C * (1 - progress);
        ringProgress.setAttribute('stroke-dashoffset', offset);

        // Position the leading dot
        const angle = -Math.PI / 2 + (2 * Math.PI * (1 - progress));
        const dotX = 100 + R * Math.cos(angle);
        const dotY = 100 + R * Math.sin(angle);
        ringDot.setAttribute('cx', dotX);
        ringDot.setAttribute('cy', dotY);

        // Urgency
        const isUrgent = remainingMs <= URGENT_THRESHOLD * 1000;
        ringProgress.classList.toggle('urgent', isUrgent);
        ringDot.classList.toggle('urgent', isUrgent);
        timeText.classList.toggle('urgent', isUrgent);

        // Format time
        const totalSec = Math.ceil(remainingMs / 1000);
        const m = Math.floor(totalSec / 60);
        const s = totalSec % 60;
        timeText.textContent = `${String(m).padStart(2, '0')}m${String(s).padStart(2, '0')}`;

        // Show fraction in last 10 seconds
        if (remainingMs <= URGENT_THRESHOLD * 1000) {
          const frac = Math.floor((remainingMs % 1000) / 10);
          timeFraction.textContent = `.${String(frac).padStart(2, '0')}`;
          timeFraction.classList.add('visible');
        } else {
          timeFraction.classList.remove('visible');
        }
      } else {
        // Overtime
        if (!overtimeStarted) {
          overtimeStarted = true;
          ringProgress.classList.remove('urgent');
          ringDot.classList.remove('urgent');
          timeText.classList.remove('urgent');
          ringProgress.classList.add('overtime');
          ringDot.classList.add('overtime');
          timeText.classList.add('overtime');
          playAlertSound();
          if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
        }

        // Full ring pulsing red
        ringProgress.setAttribute('stroke-dashoffset', '0');
        ringDot.setAttribute('cx', 100);
        ringDot.setAttribute('cy', 12);
        timeFraction.classList.remove('visible');

        // Format negative time
        const overMs = Math.abs(remainingMs);
        const totalSec = Math.floor(overMs / 1000);
        const m = Math.floor(totalSec / 60);
        const s = totalSec % 60;
        timeText.textContent = `-${String(m).padStart(2, '0')}m${String(s).padStart(2, '0')}`;
      }
    }

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && state === 'running') {
        remainingMs = endTime - Date.now();
        render();
        cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(tick);
      }
    });

    function playAlertSound() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const pattern = [
        { time: 0, freq: 880 },
        { time: 0.2, freq: 1047 },
        { time: 0.4, freq: 880 },
        { time: 0.6, freq: 1047 },
      ];
      pattern.forEach(({ time, freq }) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime + time);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + time + 0.12);
        osc.start(ctx.currentTime + time);
        osc.stop(ctx.currentTime + time + 0.12);
      });
    }

    function formatTime(date) {
      let h = date.getHours();
      const m = String(date.getMinutes()).padStart(2, '0');
      const suffix = h >= 12 ? 'p' : 'a';
      h = h % 12 || 12;
      return `${h}:${m}${suffix}`;
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('currentTime').textContent = formatTime(now);

      // Update target time
      const targetEl = document.getElementById('targetTime');
      if (state === 'running' || state === 'paused') {
        const target = new Date(now.getTime() + remainingMs);
        targetEl.textContent = formatTime(target);
      } else {
        targetEl.textContent = '';
      }
    }

    setInterval(updateClock, 1000);
    updateClock();

  </script>
</body>
</html>
